line-length = 88
target-version = "py313"

[lint]
extend-select = [
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "E",      # pycodestyle errors
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "S",      # flake8-bandit
    "TID",    # flake8-tidy-imports
    "UP",     # pyupgrade
    "W",      # pycodestyle warnings
]
ignore = [
    "E203",   # whitespace before ':', conflicts with formatter
    "E266",   # too many leading '#'
    "B905",   # zip() without strict=, noisy
    "E501",   # line length — ported code predates this gate; formatter governs
]

[lint.per-file-ignores]
"tests/**" = ["S101", "S106"]  # S101: assert, S106: hardcoded passwords (test data)
# B008: typer.Option() in defaults is the idiomatic Typer parameter pattern.
"penny/cli.py" = ["B008"]

[lint.isort]
known-first-party = ["penny"]
combine-as-imports = true
force-sort-within-sections = true

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
