[project]
name = "penny-backend"
version = "0.1.0"
description = "Penny — runs an agent-harness Agent and streams it over the Vercel AI SDK UI message stream protocol."
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "python-dotenv>=1.0",
    "agent-harness[anthropic,openai,google] @ git+https://github.com/adambossy/agent-harness.git",
    "sqlalchemy>=2.0",
    "psycopg2-binary>=2.9.11",
    "pyyaml>=6.0",
    "loguru>=0.7.3",
    "promptorium-python @ git+https://github.com/adambossy/promptorium-python@main",
    "matplotlib>=3.9",
    "boto3>=1.26",
    "stagehand>=0.5.9",
    "resend>=0.9",
    "alembic>=1.18.4",
]

[tool.uv]
package = false

# Source-replace agent-harness with the local checkout so edits in
# ~/code/agent-harness flow into Penny without re-publishing. Set
# AGENT_HARNESS_USE_GIT=1 to opt back into the git dep.
[tool.uv.sources]
agent-harness = { path = "/Users/adambossy/code/agent-harness", editable = true }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.7",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra --strict-markers"
