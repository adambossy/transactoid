# Thin deploy shim. MUST stay at the repo root (GitHub requirement), but holds
# NO deploy logic: it only sets up the environment and calls
# deploy/scripts/*.sh. All image resolution / jq rendering / fly invocation
# lives in those scripts (the source of truth).
#
# FLY_API_TOKEN must be authorized for ALL deployable Fly apps (penny,
# penny-frontend, penny-cron-manager). The cron-manager sync step is wired in
# at convergence (C2).
name: Deploy

on:
  push:
    branches:
      - main
  # Run before the daily scheduled report so the cron points at a fresh image.
  schedule:
    - cron: "40 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Alias fly to flyctl
        run: ln -s "$(which flyctl)" /usr/local/bin/fly

      - name: Configure workspace deploy key
        env:
          WORKSPACE_DEPLOY_KEY: ${{ secrets.WORKSPACE_DEPLOY_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$WORKSPACE_DEPLOY_KEY" > "$HOME/.ssh/workspace_deploy"
          chmod 600 "$HOME/.ssh/workspace_deploy"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null
          echo "GIT_SSH_COMMAND=ssh -i $HOME/.ssh/workspace_deploy -o IdentitiesOnly=yes" >> "$GITHUB_ENV"

      - name: Deploy backend
        run: bash deploy/scripts/deploy_backend.sh

      - name: Deploy frontend
        run: bash deploy/scripts/deploy_frontend.sh

      # Cron-manager sync is wired in at convergence (C2):
      #   - name: Sync cron manager
      #     run: bash deploy/scripts/sync_cron_manager.sh
