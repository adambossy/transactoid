name: Deploy And Sync Cron

on:
  push:
    branches:
      - main
  schedule:
    # Run before the daily 10:00 UTC scheduled report machine.
    - cron: "40 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy_and_sync:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Alias fly to flyctl
        run: ln -s "$(which flyctl)" /usr/local/bin/fly

      - name: Configure workspace deploy key
        env:
          WORKSPACE_DEPLOY_KEY: ${{ secrets.WORKSPACE_DEPLOY_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$WORKSPACE_DEPLOY_KEY" > "$HOME/.ssh/workspace_deploy"
          chmod 600 "$HOME/.ssh/workspace_deploy"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null
          echo "GIT_SSH_COMMAND=ssh -i $HOME/.ssh/workspace_deploy -o IdentitiesOnly=yes" >> "$GITHUB_ENV"

      - name: Deploy transactoid and sync cron manager
        env:
          WORKSPACE_REPO_URL: git@github.com:adambossy/transactoid-workspace.git
        run: make fly-deploy-and-sync-cron
