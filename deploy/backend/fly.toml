# deploy/backend/fly.toml — Penny backend, a PERSISTENT HTTP service.
#
# Unlike the legacy transactoid app (a one-shot job image), the rebuilt
# backend is a long-running uvicorn service, so it carries an [http_service]
# block. Deploy from the repo root:
#
#   fly deploy --config deploy/backend/fly.toml \
#              --dockerfile deploy/backend/Dockerfile

app = "penny"
primary_region = "iad"  # US East — close to the Neon/Supabase prod DB.

# Apply alembic migrations once per deploy, in an ephemeral release machine
# built from the NEW image, BEFORE the app machines roll — so the two app
# machines never race on migrations. `penny migrate` = `alembic upgrade head`
# (idempotent); a failure here aborts the deploy and leaves the old machines
# serving. Alembic is the sole authority on the Postgres schema (create_all is
# refused there); see docs/.../2026-07-09-alembic-sole-authority-on-postgres.md.
[deploy]
  release_command = "penny migrate"


# Non-secret runtime values. Sourced from deploy/env/deploy.env.template
# (section 1) — keep these in sync with that template. Secrets
# (GOOGLE_API_KEY, DATABASE_URL, PLAID_*, R2_*, RESEND_API_KEY) are set with
# `fly secrets set` and MUST NOT appear here.
[env]
  PYTHONUNBUFFERED = "1"
  # Environment tier (code default is already production; explicit for legibility).
  PENNY_ENV = "production"
  PENNY_AGENT_PROVIDER = "gemini"
  PENNY_AGENT_MODEL = "gemini-3.5-flash"
  PENNY_CATEGORIZER_MODEL = "gemini-3.5-flash"
  PLAID_ENV = "production"
  PENNY_SENTRY_ENVIRONMENT = "production"

[http_service]
  internal_port = 8080
  force_https = true
  # Single-user app: keep one machine always running so the first request
  # after idle doesn't pay a 10-15s cold-start (VM boot + heavy agent/
  # matplotlib imports + Neon connect). Flip min_machines_running back to 0
  # to trade that latency for scale-to-zero cost savings.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "get"
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"

# The agent loop + matplotlib are not light; 512mb was OOM-killed on the
# legacy job, so keep a 1GB baseline.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
