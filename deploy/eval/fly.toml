# deploy/eval/fly.toml — penny-eval, a JOB-ONLY app for the categorizer eval.
#
# The eval runs as an ephemeral, auto-destroyed machine spawned by the
# cron-manager (schedules.json entry `penny-eval-categorizer-12h`, app_name
# "penny-eval"). This app exists only to hold the image + a reduced secret set;
# no machine runs steady-state.
#
# It is a SEPARATE app from `penny` on purpose: the eval replays the agent over
# untrusted merchant descriptors, so isolating it from the web app's secrets
# (no PLAID_*, CLERK_*, MODAL_*) shrinks the blast radius. It reuses the backend
# IMAGE — deploy/scripts/deploy_eval.sh deploys `penny`'s latest image ref here,
# so there is one build, two apps.
#
# No [http_service] (nothing to serve) and NO release_command: the `penny` app
# owns migrations — penny-eval must never run `penny migrate`.
#
#   fly deploy --app penny-eval --config deploy/eval/fly.toml \
#              --image <penny latest image ref>

app = "penny-eval"
primary_region = "iad"  # US East — close to the Neon prod DB.

# Non-secret runtime values. deploy/env/deploy.env.template (section 1) is the
# single source — KEEP THESE IN SYNC with it. Scheduled runs read these from the
# rendered cron config.env; this [env] block only backstops a manual
# `fly machine run` first-run (which gets no config.env), so without it a manual
# eval would fall back to config.py's `openai` default provider.
# Reduced secret set (DATABASE_URL, PENNY_AGENT_READONLY_DATABASE_URL, R2_*,
# RESEND_API_KEY / SMTP_*, GOOGLE_API_KEY, PENNY_CRON_*) is set with
# `fly secrets set -a penny-eval` — see deploy/eval/README.md.
[env]
  PYTHONUNBUFFERED = "1"
  PENNY_AGENT_PROVIDER = "gemini"
  PENNY_AGENT_MODEL = "gemini-3.5-flash"
  PENNY_CATEGORIZER_MODEL = "gemini-3.5-flash"
  PENNY_WORKSPACE = "/app/.transactoid"

# Job-only: no always-on machine. The cron-manager creates the ephemeral
# per-run machine; `fly deploy` scales this to zero (see deploy_eval.sh).
[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
