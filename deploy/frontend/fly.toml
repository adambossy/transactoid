# deploy/frontend/fly.toml — Penny frontend, a static nginx app that proxies
# /api to the backend. Deploy from the repo root:
#
#   fly deploy --config deploy/frontend/fly.toml \
#              --dockerfile deploy/frontend/Dockerfile

app = "penny-frontend"
primary_region = "iad"

[build]
  dockerfile = "deploy/frontend/Dockerfile"

# The single build/runtime input is the backend origin /api/* is proxied to.
# Point this at the backend Fly app's public origin. (No secrets here.)
[env]
  BACKEND_ORIGIN = "https://penny.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
