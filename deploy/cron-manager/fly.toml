# deploy/cron-manager/fly.toml — the Penny cron-manager (scheduler) app.
#
# It runs the Fly Cron Manager, which reads /usr/local/share/schedules.json
# and spawns ephemeral, auto-destroyed job machines that run the `penny` CLI
# from the app image (the Sprites-forward job contract). Deploy from the repo
# root:
#
#   fly deploy --app penny-cron-manager \
#              --config deploy/cron-manager/fly.toml \
#              --dockerfile deploy/cron-manager/Dockerfile
#
# (deploy/scripts/sync_cron_manager.sh does this after rendering the image +
# volume id + config.env into schedules.json.)

app = "penny-cron-manager"
primary_region = "iad"

[build]
  dockerfile = "deploy/cron-manager/Dockerfile"

# The cron manager keeps its schedule/run state on a small persistent volume.
[[mounts]]
  source = "data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
