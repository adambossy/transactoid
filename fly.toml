# Fly.io configuration for Transactoid sync+report job
# This is a scheduled job, not a web service

app = "transactoid"
primary_region = "iad"  # US East - close to Supabase

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

# No HTTP service - this is a scheduled job
# The machine starts, runs sync then report, and exits

# Machine configuration for the job
# Use the smallest machine size since this is an infrequent job
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# To run manually:
#   fly machine run . \
#     --app transactoid \
#     --restart no \
#     --region iad \
#     -- /bin/sh -lc "/app/.venv/bin/transactoid sync && /app/.venv/bin/transactoid report"

# To schedule once per day:
#   fly machine run . \
#     --app transactoid \
#     --schedule daily \
#     --restart no \
#     --region iad \
#     -- /bin/sh -lc "/app/.venv/bin/transactoid sync && /app/.venv/bin/transactoid report"

# Alternative: Use Fly Cron Manager for more control
# See: https://fly.io/docs/blueprints/task-scheduling/
