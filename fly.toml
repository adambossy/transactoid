# Fly.io configuration for Transactoid sync+run job
# This is a scheduled job, not a web service

app = "transactoid"
primary_region = "iad"  # US East - close to Supabase

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

# No HTTP service - this is a scheduled job
# The machine pulls latest origin/main, then runs sync and run, and exits
# Email settings: configs/email.yaml

# Machine configuration for the job
# 512MB was OOM-killed during sync/run; use 1GB baseline.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"

# To run manually:
#   fly machine run . \
#     --app transactoid \
#     --restart no \
#     --region iad \
#     --vm-size shared-cpu-1x \
#     --vm-memory 1024 \
#     -- /bin/sh -lc "git -C /app fetch --depth=1 origin main && git -C /app checkout -B main FETCH_HEAD && /app/.venv/bin/transactoid sync \"$PLAID_ACCESS_TOKEN\" && /app/.venv/bin/transactoid run --prompt-key report-monthly"

# To schedule once per day:
#   fly machine run . \
#     --app transactoid \
#     --schedule daily \
#     --restart no \
#     --region iad \
#     --vm-size shared-cpu-1x \
#     --vm-memory 1024 \
#     -- /bin/sh -lc "git -C /app fetch --depth=1 origin main && git -C /app checkout -B main FETCH_HEAD && /app/.venv/bin/transactoid sync \"$PLAID_ACCESS_TOKEN\" && /app/.venv/bin/transactoid run --prompt-key report-monthly"

# Alternative: Use Fly Cron Manager for more control
# See: https://fly.io/docs/blueprints/task-scheduling/
